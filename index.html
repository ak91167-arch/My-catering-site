    <title>Anukul Catering | Shandaar Bengali Bhoj</title>
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; padding: 0; text-align: center; background-color: #fffaf0; color: #800000; }
        
        /* Header with Traditional Border Look */
        header { 
            background-color: #b03a2e; /* Deep Red */
            background-image: linear-gradient(45deg, #800000 25%, transparent 25%);
            background-size: 4px 4px;
            padding: 60px 20px; color: #f4d03f; 
            border-bottom: 8px solid #f4d03f; /* Golden Border */
        }
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .btn { background: #f4d03f; color: #800000; padding: 15px 30px; text-decoration: none; border-radius: 2px; font-weight: bold; display: inline-block; margin-top: 20px; border: 2px solid #800000; }

        /* Menu Section */
        .menu-title { margin-top: 40px; color: #800000; font-size: 2.2rem; font-weight: bold; text-decoration: underline; }
        
        .gallery { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 30px; }
        
        .food-card { 
            background: white; width: 90%; max-width: 500px; 
            border: 3px solid #b03a2e; border-radius: 0; /* Traditional Sharp Look */
            box-shadow: 10px 10px 0px #f4d03f; overflow: hidden;
        }
        .food-card img { width: 100%; height: 250px; object-fit: cover; border-bottom: 3px solid #b03a2e; }
        .food-card h3 { margin: 15px 0 5px; font-size: 1.5rem; color: #800000; }
        .food-card p { margin-bottom: 15px; font-style: italic; color: #444; }

        footer { background: #333; color: #f4d03f; padding: 30px; margin-top: 50px; }
    </style>
</head>
