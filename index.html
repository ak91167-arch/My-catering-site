<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anukul Catering | Swadisht Khana</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; text-align: center; background-color: #fffaf5; color: #333; }
        
        /* Top Banner with Background Image */
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1555244162-803834f70033?w=1200');
            background-size: cover; background-position: center;
            padding: 80px 20px; color: white;
        }
        .hero h1 { font-size: 2.8rem; margin: 0; }
        
        .btn { background: #25d366; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; display: inline-block; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .section-title { margin-top: 40px; color: #d35400; font-size: 1.8rem; border-bottom: 2px solid #d35400; display: inline-block; padding-bottom: 5px; }

        /* Photo Gallery Grid */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .gallery-item { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .gallery-item img { width: 100%; height: 200px; object-fit: cover; transition: 0.3s; }
        .gallery-item img:hover { transform: scale(1.05); }
        .gallery-item p { padding: 10px; font-weight: bold; margin: 0; }

        .footer { padding: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Anukul Catering</h1>
    <p>Best Quality Food for Weddings & Parties</p>
    <a href="https://wa.me/91919641796197?text=Hi, I want to enquire about catering" class="btn">WhatsApp par Order Karein</a>
</div>

<h2 class="section-title">Hamari Specialities</h2>

<div class="gallery">
    <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7?w=500" alt="Paneer">
        <p>Shahi Paneer & Malai Kofta</p>
    </div>
    <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=500" alt="Dal">
        <p>Dal Makhani & Mix Veg</p>
    </div>
    <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=500" alt="Biryani">
        <p>Veg/Non-Veg Biryani</p>
    </div>
    <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1567103472667-6898f3a7bca8?w=500" alt="Sweets">
        <p>Gulab Jamun & Jalebi</p>
    </div>
</div>

<div class="footer">
    <p>Contact: +91 96417 96197</p>
    <p>&copy; 2026 Anukul Catering. All Rights Reserved.</p>
</div>

</body>
</html>
